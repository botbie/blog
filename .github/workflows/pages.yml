name: Deploy Jekyll site to Pages

# Runs a full (non-safe) Jekyll build so the custom plugins under _plugins/
# (jekyll-paginate-authors.rb, jekyll-paginate-tags.rb) are executed, then
# publishes the result via the official Pages deployment action.
#
# Requires repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

# Minimum permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs but let a
# currently deploying run finish so the Pages site is never left broken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Fork-safe build smoke test. Runs on pull_request events from anywhere
  # (including forks) and on manual dispatch. Has no deploy side effects,
  # so it's safe to leave unguarded.
  check:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
      BUNDLE_WITHOUT: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build

  build:
    # Only run deploy pipeline on the upstream botbie/blog repo; skip on forks.
    if: github.repository == 'botbie/blog' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
      BUNDLE_WITHOUT: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ruby version is read from .ruby-version. bundler-cache also installs
      # gems and caches them across runs.
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.repository == 'botbie/blog' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
